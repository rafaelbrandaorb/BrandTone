<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandTone Mix Editor - Estúdio Grátis</title>
    <style>
        :root {
            --brandlab-orange: #ff5722;
            --brandlab-orange-hover: #f4511e;
            --bg-main: #121318;
            --bg-sidebar: #191b22;
            --bg-track: #1d202a;
            --border-color: #2a2e3d;
            --text-color: #e2e8f0;
            --text-muted: #747d8c;
            --selection-color: rgba(255, 87, 34, 0.25);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* BARRA SUPERIOR (TRANSPORT BAR) */
        .top-bar {
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: var(--brandlab-orange);
        }

        .transport-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-transport {
            background: #2b2e3c;
            border: 1px solid var(--border-color);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-play-active {
            background-color: var(--brandlab-orange) !important;
            border-color: var(--brandlab-orange);
        }

        .btn-export {
            background-color: #2ed573;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-choose {
            background-color: var(--brandlab-orange);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(255,87,34,0.3);
        }

        .lcd-display {
            background-color: #0b0c0e;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #51e1ed;
            display: flex;
            gap: 10px;
        }

        /* ÁREA CENTRAL DO ESTÚDIO */
        .main-studio {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .upload-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        .upload-box {
            border: 2px dashed #3a3f52;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            background: var(--bg-sidebar);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        /* TRACK TIMELINE */
        .editor-workspace {
            display: none;
            flex: 1;
            flex-direction: column;
            width: 100%;
        }

        .track-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            height: 140px;
            background-color: var(--bg-main);
        }

        .track-header {
            width: 120px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .track-title {
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .track-buttons {
            display: flex;
            gap: 4px;
        }

        .btn-track-opt {
            background: #2b2e3c;
            border: none;
            color: var(--text-muted);
            width: 22px;
            height: 22px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .volume-fader-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .volume-fader {
            flex: 1;
            accent-color: #51e1ed !important;
            height: 4px;
        }

        .track-timeline {
            flex: 1;
            position: relative;
            background-color: var(--bg-track);
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .selection-box {
            position: absolute;
            top: 0;
            height: 100%;
            background-color: var(--selection-color);
            border-left: 1px solid var(--brandlab-orange);
            border-right: 1px solid var(--brandlab-orange);
            z-index: 2;
            pointer-events: none;
            width: 0;
            left: 0;
        }

        .playhead {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 0 10px #fff;
            z-index: 3;
            pointer-events: none;
            left: 0;
        }

        /* PAINEL INFERIOR DE CONFIGURAÇÃO */
        .bottom-panel {
            background-color: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pitch-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .pitch-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--text-muted);
        }

        .pitch-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--brandlab-orange);
            min-width: 45px;
        }

        .slider-wrapper {
            flex: 1;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--brandlab-orange);
            background: #2b2e3c;
            height: 5px;
            border-radius: 3px;
            outline: none;
        }

        .tip-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">BrandTone <span>Studio</span></div>
        
        <div class="transport-controls">
            <button class="btn-transport" id="play-btn">▶ PLAY</button>
            <button class="btn-transport" id="stop-btn">◼ STOP</button>
        </div>

        <div class="lcd-display">
            <span id="current-time">00:00.0</span>
        </div>

        <div>
            <button class="btn-export" id="download-btn">EXPORTAR</button>
        </div>
    </div>

    <div class="main-studio">
        
        <div class="upload-screen" id="upload-screen">
            <div class="upload-box">
                <h2 style="margin-top:0; color:#fff; font-size: 1.3rem;">Estúdio Grátis (iPhone)</h2>
                <p style="color:var(--text-muted); font-size: 0.85rem;">Toque no botão e escolha o áudio salvo no seu app "Arquivos":</p>
                
                <button type="button" class="btn-choose" onclick="document.getElementById('audio-file').click();">Escolher Arquivo</button>
                <input type="file" id="audio-file" accept=".mp3,.wav,audio/mpeg,audio/wav,audio/x-wav">
                
                <div id="loading-msg" style="margin-top: 15px; color: #51e1ed; font-size: 0.85rem; display: none;">Carregando trilha no iPhone...</div>
            </div>
        </div>

        <div class="editor-workspace" id="editor-workspace">
            <div class="track-row">
                <div class="track-header">
                    <div class="track-title">🎤 Track 1</div>
                    <div class="track-controls">
                        <div class="track-buttons">
                            <button class="btn-track-opt">M</button>
                            <button class="btn-track-opt">S</button>
                        </div>
                        <div class="volume-fader-container">
                            <input type="range" class="volume-fader" id="volume-control" min="0" max="1" step="0.01" value="0.8">
                        </div>
                    </div>
                </div>

                <div class="track-timeline" id="timeline">
                    <canvas id="waveform"></canvas>
                    <div class="selection-box" id="selection"></div>
                    <div class="playhead" id="playhead"></div>
                </div>
            </div>

            <div class="bottom-panel">
                <div class="pitch-card">
                    <div>
                        <div class="pitch-label">Auto-Pitch</div>
                        <div class="pitch-value"><span id="pitch-val">0</span></div>
                    </div>
                    <div class="slider-wrapper">
                        <input type="range" id="pitch-shift" min="-12" max="12" step="1" value="0">
                    </div>
                </div>
                <div class="tip-text">
                    Arraste o dedo na track para selecionar um trecho específico.
                </div>
            </div>
        </div>

    </div>

<script>
    let audioContext;
    let audioBuffer;
    let currentSource;
    let gainNode; 
    let isPlaying = false;
    let startTime = 0;
    let playheadAnimation;
    
    let selStartSec = 0;
    let selEndSec = 0;

    const fileInput = document.getElementById('audio-file');
    const uploadScreen = document.getElementById('upload-screen');
    const loadingMsg = document.getElementById('loading-msg');
    const workspace = document.getElementById('editor-workspace');
    const canvas = document.getElementById('waveform');
    const timeline = document.getElementById('timeline');
    const selectionBox = document.getElementById('selection');
    const playhead = document.getElementById('playhead');
    
    const txtCurrentTime = document.getElementById('current-time');
    const pitchSlider = document.getElementById('pitch-shift');
    const pitchVal = document.getElementById('pitch-val');
    const volumeControl = document.getElementById('volume-control');
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const downloadBtn = document.getElementById('download-btn');

    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioContext.createGain();
            gainNode.connect(audioContext.destination);
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }

    volumeControl.addEventListener('input', function() {
        if (gainNode) gainNode.gain.value = this.value;
    });

    fileInput.addEventListener('change', function(e) {
        initAudio();
        const file = e.target.files[0];
        if (!file) return;

        loadingMsg.style.display = 'block';

        const reader = new FileReader();
        reader.onload = function(event) {
            audioContext.decodeAudioData(event.target.result, function(buffer) {
                audioBuffer = buffer;
                selStartSec = 0;
                selEndSec = buffer.duration;
                
                drawWaveform(buffer);
                uploadScreen.style.display = 'none';
                workspace.style.display = 'flex';
            }, function(err) {
                alert("Erro ao decodificar no iPhone. Tente salvar o áudio como MP3 ou WAV nativo no app Arquivos.");
                loadingMsg.style.display = 'none';
            });
        };
        reader.readAsArrayBuffer(file);
    });

    function drawWaveform(buffer) {
        const ctx = canvas.getContext('2d');
        const width = timeline.offsetWidth;
        const height = timeline.offsetHeight;
        
        canvas.width = width;
        canvas.height = height;

        const leftChannel = buffer.getChannelData(0); 
        const step = Math.ceil(leftChannel.length / width);
        const amp = height / 2;

        ctx.clearRect(0, 0, width, height);

        ctx.fillStyle = '#ff5722';
        for (let i = 0; i < width; i++) {
            let min = 1.0;
            let max = -1.0;
            for (let j = 0; j < step; j++) {
                let dat = leftChannel[(i * step) + j];
                if (dat < min) min = dat;
                if (dat > max) max = dat;
            }
            ctx.fillRect(i, (1 + min) * amp, 2, Math.max(1, (max - min) * amp));
        }
    }

    // SUPORTE PARA TOQUE DE TELA (TOUCH) NO IPHONE
    let isSelecting = false;
    let startX = 0;

    function handleStart(clientX) {
        initAudio();
        isSelecting = true;
        const rect = timeline.getBoundingClientRect();
        startX = clientX - rect.left;
        selectionBox.style.left = startX + 'px';
        selectionBox.style.width = '0px';
    }

    function handleMove(clientX) {
        if (!isSelecting) return;
        const rect = timeline.getBoundingClientRect();
        let currentX = clientX - rect.left;
        
        if(currentX < 0) currentX = 0;
        if(currentX > rect.width) currentX = rect.width;

        const left = Math.min(startX, currentX);
        const width = Math.abs(startX - currentX);

        selectionBox.style.left = left + 'px';
        selectionBox.style.width = width + 'px';

        selStartSec = (left / rect.width) * audioBuffer.duration;
        selEndSec = ((left + width) / rect.width) * audioBuffer.duration;
    }

    timeline.addEventListener('mousedown', (e) => handleStart(e.clientX));
    timeline.addEventListener('mousemove', (e) => handleMove(e.clientX));
    
    timeline.addEventListener('touchstart', (e) => {
        handleStart(e.touches[0].clientX);
    }, {passive: true});
    
    timeline.addEventListener('touchmove', (e) => {
        handleMove(e.touches[0].clientX);
    }, {passive: true});

    window.addEventListener('mouseup', () => isSelecting = false);
    window.addEventListener('touchend', () => isSelecting = false);

    pitchSlider.addEventListener('input', function() {
        pitchVal.innerText = this.value;
    });

    // REPRODUÇÃO
    playBtn.addEventListener('click', function() {
        initAudio();
        if (isPlaying) {
            stopAudio();
            return;
        }
        if (!audioBuffer) return;

        if(selStartSec === selEndSec || selEndSec === 0) {
            selStartSec = 0;
            selEndSec = audioBuffer.duration;
        }

        const durationToPlay = selEndSec - selStartSec;
        const targetBuffer = getTrimmedBuffer(audioContext, audioBuffer, selStartSec, selEndSec);

        currentSource = audioContext.createBufferSource();
        currentSource.buffer = targetBuffer;

        const semitones = parseFloat(pitchSlider.value);
        currentSource.playbackRate.value = Math.pow(2, semitones / 12);

        currentSource.connect(gainNode);
        
        startTime = audioContext.currentTime;
        currentSource.start(0);
        isPlaying = true;
        playBtn.innerText = "⏸ PAUSE";
        playBtn.classList.add('btn-play-active');

        updatePlayhead(durationToPlay);

        currentSource.onended = function() {
            stopAudio();
        };
    });

    stopBtn.addEventListener('click', stopAudio);

    function stopAudio() {
        if (currentSource) {
            try { currentSource.stop(); } catch(e){}
        }
        isPlaying = false;
        playBtn.innerText = "▶ PLAY";
        playBtn.classList.remove('btn-play-active');
        cancelAnimationFrame(playheadAnimation);
        playhead.style.left = '0px';
        txtCurrentTime.innerText = "00:00.0";
    }

    function updatePlayhead(duration) {
        if (!isPlaying) return;

        const elapsed = audioContext.currentTime - startTime;
        const timelineWidth = timeline.offsetWidth;
        
        const startX = (selStartSec / audioBuffer.duration) * timelineWidth;
        const endX = (selEndSec / audioBuffer.duration) * timelineWidth;
        const selectionWidth = endX - startX;

        const currentProgress = elapsed / (duration / currentSource.playbackRate.value);
        const currentPos = startX + (selectionWidth * currentProgress);

        if (currentPos <= endX) {
            playhead.style.left = currentPos + 'px';
            txtCurrentTime.innerText = formatTime(selStartSec + (elapsed * currentSource.playbackRate.value));
            playheadAnimation = requestAnimationFrame(() => updatePlayhead(duration));
        } else {
            playhead.style.left = startX + 'px';
        }
    }

    downloadBtn.addEventListener('click', function() {
        if (!audioBuffer) return;
        const targetBuffer = getTrimmedBuffer(audioContext, audioBuffer, selStartSec, selEndSec);
        if (!targetBuffer) return;

        const semitones = parseFloat(pitchSlider.value);
        const wavBlob = bufferToWav(targetBuffer, semitones);
        const url = URL.createObjectURL(wavBlob);
        
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = 'brandtone_mix.wav';
        anchor.click();
    });

    function getTrimmedBuffer(context, buffer, start, end) {
        const rate = buffer.sampleRate;
        const startOffset = Math.floor(start * rate);
        const endOffset = Math.floor(end * rate);
        const frameCount = endOffset - startOffset;

        if (frameCount <= 0) return null;

        const trimmedBuffer = context.createBuffer(buffer.numberOfChannels, frameCount, rate);
        for (let channel = 0; channel < buffer.numberOfChannels; channel++) {
            const channelData = buffer.getChannelData(channel);
            const trimmedData = trimmedBuffer.getChannelData(channel);
            for (let i = 0; i < frameCount; i++) {
                trimmedData[i] = channelData[startOffset + i];
            }
        }
        return trimmedBuffer;
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        const ms = Math.floor((seconds % 1) * 10);
        return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}.${ms}`;
    }

    function bufferToWav(buffer, pitchSemitones) {
        const playbackRateFactor = Math.pow(2, pitchSemitones / 12);
        const numOfChan = buffer.numberOfChannels;
        const originalSampleRate = buffer.sampleRate;
        const format = 1;
        const bitDepth = 16;
        
        let result = numOfChan === 2 ? interleave(buffer.getChannelData(0), buffer.getChannelData(1)) : buffer.getChannelData(0);
        const bufferLen = result.length * 2;
        const ab = new ArrayBuffer(44 + bufferLen);
        const view = new DataView(ab);
        
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + bufferLen, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numOfChan, true);
        view.setUint32(24, originalSampleRate, true);
        view.setUint32(28, originalSampleRate * numOfChan * (bitDepth / 8), true);
        view.setUint16(32, numOfChan * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(view, 36, 'data');
        view.setUint32(40, bufferLen, true);
        floatTo16BitPCM(view, 44, result);
        
        return new Blob([view], { type: 'audio/wav' });
    }

    function interleave(inputL, inputR) {
        const length = inputL.length + inputR.length;
        const result = new Float32Array(length);
        let index = 0, inputIndex = 0;
        while (index < length) {
            result[index++] = inputL[inputIndex];
            result[index++] = inputR[inputIndex];
            inputIndex++;
        }
        return result;
    }

    function floatTo16BitPCM(output, offset, input) {
        for (let i = 0; i < input.length; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, input[i]));
            output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }
</script>
</body>
</html>
