<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandTone Studio - Ferramentas Livres</title>
    <style>
        :root {
            --brandlab-orange: #ff5722;
            --brandlab-orange-hover: #f4511e;
            --bg-main: #0c0d12;
            --bg-sidebar: #14161e;
            --bg-track: #1a1d26;
            --border-color: #262a36;
            --text-color: #e2e8f0;
            --text-muted: #6b7280;
            --selection-color: rgba(255, 87, 34, 0.25);
            --accent-cyan: #06b6d4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* BARRA SUPERIOR */
        .top-bar {
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
        }

        .logo span {
            color: var(--brandlab-orange);
        }

        .transport-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-transport {
            background: #222531;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn-transport:hover {
            background: #2d3142;
        }

        .btn-play-active {
            background-color: var(--brandlab-orange) !important;
            border-color: var(--brandlab-orange);
        }

        .btn-export {
            background-color: #10b981;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-export:hover {
            background-color: #059669;
        }

        .lcd-display {
            background-color: #06070a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 15px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--accent-cyan);
            display: flex;
            gap: 20px;
        }

        /* ÁREA CENTRAL */
        .main-studio {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .upload-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .upload-box {
            border: 2px dashed #2d3142;
            padding: 60px 100px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            background: var(--bg-sidebar);
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: var(--brandlab-orange);
        }

        .editor-workspace {
            display: none;
            flex: 1;
            flex-direction: column;
            width: 100%;
        }

        .track-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            height: 160px;
            background-color: var(--bg-main);
        }

        .track-header {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .track-title {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .track-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .track-buttons {
            display: flex;
            gap: 6px;
        }

        .btn-track-opt {
            background: #222531;
            border: none;
            color: #9ca3af;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        .volume-fader-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-fader {
            flex: 1;
            accent-color: var(--accent-cyan) !important;
        }

        .track-timeline {
            flex: 1;
            position: relative;
            background-color: var(--bg-track);
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .selection-box {
            position: absolute;
            top: 0;
            height: 100%;
            background-color: var(--selection-color);
            border-left: 1px solid var(--brandlab-orange);
            border-right: 1px solid var(--brandlab-orange);
            z-index: 2;
            pointer-events: none;
            width: 0;
            left: 0;
        }

        .playhead {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 0 10px #fff;
            z-index: 3;
            pointer-events: none;
            left: 0;
        }

        /* PAINEL INFERIOR DE COMPONENTES E EFEITOS LIBERADOS */
        .bottom-fx-panel {
            background-color: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .fx-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .fx-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .fx-label span {
            color: var(--brandlab-orange);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">BrandTone <span>Studio XL</span></div>
        
        <div class="transport-controls">
            <button class="btn-transport" id="play-btn">▶ PLAY</button>
            <button class="btn-transport" id="stop-btn">◼ STOP</button>
        </div>

        <div class="lcd-display">
            <div>TEMPO: <span id="current-time">00:00.0</span></div>
            <div>SELEÇÃO: <span id="selection-time">Trilha Completa</span></div>
        </div>

        <div>
            <button class="btn-export" id="download-btn">EXPORTAR WAV INTEGRAL</button>
        </div>
    </div>

    <div class="main-studio">
        
        <div class="upload-screen" id="upload-screen">
            <div class="upload-box" onclick="document.getElementById('audio-file').click()">
                <h2 style="margin-top:0; color:#fff;">Iniciar Estúdio Premium Livre</h2>
                <p style="color:var(--text-muted); font-size: 0.9rem;">Todas as ferramentas de automação e correção estão desbloqueadas.</p>
                <input type="file" id="audio-file" accept="audio/*">
            </div>
        </div>

        <div class="editor-workspace" id="editor-workspace">
            <div class="track-row">
                <div class="track-header">
                    <div class="track-title">🎤 Audio Master Track</div>
                    <div class="track-controls">
                        <div class="track-buttons">
                            <button class="btn-track-opt">M</button>
                            <button class="btn-track-opt">S</button>
                            <button class="btn-track-opt" style="color:#ff4757;">●</button>
                        </div>
                        <div class="volume-fader-container">
                            <span style="font-size:0.65rem; color:var(--text-muted);">VOL</span>
                            <input type="range" class="volume-fader" id="volume-control" min="0" max="1" step="0.01" value="0.8">
                        </div>
                    </div>
                </div>

                <div class="track-timeline" id="timeline">
                    <canvas id="waveform"></canvas>
                    <div class="selection-box" id="selection"></div>
                    <div class="playhead" id="playhead"></div>
                </div>
            </div>

            <div class="bottom-fx-panel">
                <div class="fx-card">
                    <div class="fx-label">Auto-Pitch <span id="pitch-val">0 semitons</span></div>
                    <input type="range" id="pitch-shift" min="-12" max="12" step="1" value="0">
                </div>

                <div class="fx-card">
                    <div class="fx-label">Auto-Tune Speed <span id="speed-val">50ms</span></div>
                    <input type="range" id="tune-speed" min="1" max="100" step="1" value="50">
                </div>

                <div class="fx-card">
                    <div class="fx-label">Bass Booster <span id="bass-val">0 dB</span></div>
                    <input type="range" id="bass-boost" min="0" max="12" step="1" value="0">
                </div>

                <div class="fx-card">
                    <div class="fx-label">Playback Speed <span id="play-speed-val">1.0x</span></div>
                    <input type="range" id="playback-speed" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>
        </div>

    </div>

<script>
    let audioContext;
    let audioBuffer;
    let currentSource;
    let gainNode;
    let bassFilterNode;
    let isPlaying = false;
    let startTime = 0;
    let playheadAnimation;
    
    let selStartSec = 0;
    let selEndSec = 0;

    const fileInput = document.getElementById('audio-file');
    const uploadScreen = document.getElementById('upload-screen');
    const workspace = document.getElementById('editor-workspace');
    const canvas = document.getElementById('waveform');
    const timeline = document.getElementById('timeline');
    const selectionBox = document.getElementById('selection');
    const playhead = document.getElementById('playhead');
    
    const txtCurrentTime = document.getElementById('current-time');
    const txtSelectionTime = document.getElementById('selection-time');
    
    // Sliders
    const pitchSlider = document.getElementById('pitch-shift');
    const pitchVal = document.getElementById('pitch-val');
    const tuneSpeedSlider = document.getElementById('tune-speed');
    const speedVal = document.getElementById('speed-val');
    const bassSlider = document.getElementById('bass-boost');
    const bassVal = document.getElementById('bass-val');
    const playSpeedSlider = document.getElementById('playback-speed');
    const playSpeedVal = document.getElementById('play-speed-val');
    const volumeControl = document.getElementById('volume-control');
    
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const downloadBtn = document.getElementById('download-btn');

    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioContext.createGain();
            
            // Criando filtro de graves (Lowpass/Low架) para o Bass Booster
            bassFilterNode = audioContext.createBiquadFilter();
            bassFilterNode.type = "lowshelf";
            bassFilterNode.frequency.value = 200; // Frequência de graves
            bassFilterNode.gain.value = parseFloat(bassSlider.value);

            // Conexões de áudio em série
            bassFilterNode.connect(gainNode);
            gainNode.connect(audioContext.destination);
        }
    }

    // listeners de tempo real para os controles deslizantes
    volumeControl.addEventListener('input', function() { if (gainNode) gainNode.gain.value = this.value; });
    bassSlider.addEventListener('input', function() {
        bassVal.innerText = this.value + " dB";
        if (bassFilterNode) bassFilterNode.gain.value = parseFloat(this.value);
    });
    pitchSlider.addEventListener('input', function() { pitchVal.innerText = this.value + " semitons"; });
    tuneSpeedSlider.addEventListener('input', function() { speedVal.innerText = this.value + "ms"; });
    playSpeedSlider.addEventListener('input', function() { playSpeedVal.innerText = this.value + "x"; });

    fileInput.addEventListener('change', function(e) {
        initAudio();
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            audioContext.decodeAudioData(event.target.result, function(buffer) {
                audioBuffer = buffer;
                selStartSec = 0;
                selEndSec = buffer.duration;
                drawWaveform(buffer);
                uploadScreen.style.display = 'none';
                workspace.style.display = 'flex';
            });
        };
        reader.readAsArrayBuffer(file);
    });

    function drawWaveform(buffer) {
        const ctx = canvas.getContext('2d');
        const width = timeline.offsetWidth;
        const height = timeline.offsetHeight;
        canvas.width = width;
        canvas.height = height;

        const leftChannel = buffer.getChannelData(0); 
        const step = Math.ceil(leftChannel.length / width);
        const amp = height / 2;

        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = '#1e2230';
        ctx.lineWidth = 1;
        for(let g = 0; g < width; g += 60) {
            ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, height); ctx.stroke();
        }

        ctx.fillStyle = '#ff5722';
        for (let i = 0; i < width; i++) {
            let min = 1.0, max = -1.0;
            for (let j = 0; j < step; j++) {
                let dat = leftChannel[(i * step) + j];
                if (dat < min) min = dat;
                if (dat > max) max = dat;
            }
            ctx.fillRect(i, (1 + min) * amp, 2, Math.max(1, (max - min) * amp));
        }
    }

    let isSelecting = false, startX = 0;
    timeline.addEventListener('mousedown', (e) => {
        isSelecting = true;
        const rect = timeline.getBoundingClientRect();
        startX = e.clientX - rect.left;
        selectionBox.style.left = startX + 'px';
        selectionBox.style.width = '0px';
    });

    timeline.addEventListener('mousemove', (e) => {
        if (!isSelecting) return;
        const rect = timeline.getBoundingClientRect();
        let currentX = e.clientX - rect.left;
        if(currentX < 0) currentX = 0;
        if(currentX > rect.width) currentX = rect.width;

        const left = Math.min(startX, currentX);
        const width = Math.abs(startX - currentX);
        selectionBox.style.left = left + 'px';
        selectionBox.style.width = width + 'px';

        selStartSec = (left / rect.width) * audioBuffer.duration;
        selEndSec = ((left + width) / rect.width) * audioBuffer.duration;
        txtSelectionTime.innerText = `${selStartSec.toFixed(1)}s - ${selEndSec.toFixed(1)}s`;
    });

    window.addEventListener('mouseup', () => { isSelecting = false; });

    // ENGENHARIA DE REPRODUÇÃO COM OS EFEITOS ATIVOS
    playBtn.addEventListener('click', function() {
        initAudio();
        if (isPlaying) { stopAudio(); return; }
        if (!audioBuffer) return;

        if(selStartSec === selEndSec || selEndSec === 0) {
            selStartSec = 0;
            selEndSec = audioBuffer.duration;
        }

        const durationToPlay = selEndSec - selStartSec;
        const targetBuffer = getTrimmedBuffer(audioContext, audioBuffer, selStartSec, selEndSec);

        currentSource = audioContext.createBufferSource();
