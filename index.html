<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandTone - Estúdio Musical</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .upload-section {
            border: 2px dashed #475569;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-section:hover {
            border-color: var(--primary);
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            margin-top: 25px;
            display: none;
        }

        .control-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            background: #334155;
            border: 1px solid #475569;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #4f46e5;
        }

        .status {
            font-size: 0.85rem;
            color: #10b981;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BrandTone</h1>
    <div class="subtitle">Ajuste de tom e edição simplificada</div>

    <div class="upload-section" onclick="document.getElementById('audio-file').click()">
        <p id="upload-text">Clique para selecionar seu arquivo de áudio (.mp3, .wav)</p>
        <input type="file" id="audio-file" accept="audio/*">
    </div>

    <div id="status-msg" class="status"></div>

    <div class="controls" id="editor-controls">
        <div class="control-group">
            <label for="pitch-shift">Ajuste Fino de Tom (Semitons): <span id="pitch-val">0</span></label>
            <input type="range" id="pitch-shift" min="-12" max="12" step="1" value="0">
        </div>

        <button class="btn" id="play-btn">Reproduzir Áudio Modificado</button>
    </div>
</div>

<script>
    let audioContext;
    let audioBuffer;
    let currentSource;

    const fileInput = document.getElementById('audio-file');
    const uploadText = document.getElementById('upload-text');
    const controls = document.getElementById('editor-controls');
    const statusMsg = document.getElementById('status-msg');
    const pitchSlider = document.getElementById('pitch-shift');
    const pitchVal = document.getElementById('pitch-val');
    const playBtn = document.getElementById('play-btn');

    // Inicializa o contexto de áudio
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Carrega o arquivo de áudio
    fileInput.addEventListener('change', function(e) {
        initAudio();
        const file = e.target.files[0];
        if (!file) return;

        uploadText.innerText = file.name;
        statusMsg.innerText = "Carregando e decodificando áudio...";

        const reader = new FileReader();
        reader.onload = function(event) {
            audioContext.decodeAudioData(event.target.result, function(buffer) {
                audioBuffer = buffer;
                statusMsg.innerText = "Áudio pronto para edição!";
                controls.style.display = 'block';
            }, function(err) {
                statusMsg.innerText = "Erro ao ler arquivo de áudio.";
                console.error(err);
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // Atualiza o valor do texto do slider
    pitchSlider.addEventListener('input', function() {
        pitchVal.innerText = this.value;
        if (currentSource) {
            // Aplica a mudança em tempo real se estiver tocando
            // A fórmula matemática para calcular o semitom na taxa de reprodução é: 2 ^ (semitones / 12)
            currentSource.playbackRate.value = Math.pow(2, this.value / 12);
        }
    });

    // Toca ou para o áudio ajustado
    playBtn.addEventListener('click', function() {
        initAudio();

        if (playBtn.innerText === "Parar Áudio") {
            stopAudio();
            return;
        }

        if (!audioBuffer) return;

        // Cria a fonte de reprodução
        currentSource = audioContext.createBufferSource();
        currentSource.buffer = audioBuffer;

        // Aplica o valor atual do pitch (taxa de reprodução)
        const semitones = parseFloat(pitchSlider.value);
        currentSource.playbackRate.value = Math.pow(2, semitones / 12);

        // Conecta a saída de som nos alto-falantes
        currentSource.connect(audioContext.destination);
        currentSource.start(0);
        
        playBtn.innerText = "Parar Áudio";

        currentSource.onended = function() {
            playBtn.innerText = "Reproduzir Áudio Modificado";
        };
    });

    function stopAudio() {
        if (currentSource) {
            currentSource.stop();
        }
        playBtn.innerText = "Reproduzir Áudio Modificado";
    }
</script>

</body>
</html>
